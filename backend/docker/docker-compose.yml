name: inkgrid

# x-app-env: 容器内覆盖 .env 的 localhost 为 docker 服务名。
# .env 保持 localhost 供宿主机 conda 环境直跑；容器内通过 environment 覆盖。
x-app-env: &app-env
  DATABASE_URL: postgresql+asyncpg://inkgrid:inkgrid@postgres:5432/inkgrid
  REDIS_URL: redis://redis:6379/0
  MINIO_ENDPOINT: minio:9000
  MILVUS_HOST: milvus
  # TEI 容器内监听 80，映射到宿主机 8080/8081；容器间用服务名:80
  EMBEDDING_TEI_URL: http://tei-embedding:80
  RERANKER_TEI_URL: http://tei-reranker:80
  # LM Studio 跑在宿主机，容器内用 host.docker.internal 访问
  LLM_BASE_URL: http://host.docker.internal:1234/v1

services:
  # FastAPI HTTP + WebSocket
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: ../.env
    environment:
      <<: *app-env
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      milvus:
        condition: service_started
      meilisearch:
        condition: service_started
      minio:
        condition: service_started
      tei-embedding:
        condition: service_healthy
      tei-reranker:
        condition: service_healthy

  # Celery worker（入库 / 采集 / 重建）
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A app.tasks.celery_app worker -l info
    env_file: ../.env
    environment:
      <<: *app-env
    volumes:
      - ..:/app
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
      milvus:
        condition: service_started
      tei-embedding:
        condition: service_healthy
      tei-reranker:
        condition: service_healthy

  # Celery beat（定时任务）
  beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A app.tasks.celery_app beat -l info
    env_file: ../.env
    environment:
      <<: *app-env
    volumes:
      - ..:/app
    depends_on:
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inkgrid
      POSTGRES_PASSWORD: inkgrid
      POSTGRES_DB: inkgrid
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  milvus:
    image: milvusdb/milvus:v2.4.0
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvusdata:/var/lib/milvus

  meilisearch:
    image: getmeili/meilisearch:v1.6
    environment:
      MEILI_MASTER_KEY: meili-dev-key
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/meili_data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # ===== TEI Embedding 服务（BGE-M3 稠密向量） =====
  # 入库 pipeline 通过 EMBEDDING_TEI_URL 调用，生成 1024 维向量写入 Milvus
  # 首次启动从本地 ../models/bge-m3 加载（onnx 后端），需提前下载模型
  tei-embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    restart: unless-stopped
    command: ["--model-id", "/data/bge-m3", "--port", "80"]
    environment:
      HUGGINGFACE_HUB_OFFLINE: "1"
    ports:
      - "8080:80"
    volumes:
      - ../models:/data
    # TEI 镜像无 curl/wget，用 bash /dev/tcp 做 TCP 端口探测
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/80' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ===== TEI Reranker 服务（bge-reranker-v2-m3 精排） =====
  # 问答检索时通过 RERANKER_TEI_URL 调用，对召回的 chunks 重排序
  # candle 后端加载 safetensors；限制 workers 和 batch 防 OOM (137)
  tei-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    restart: unless-stopped
    command: ["--model-id", "/data/bge-reranker-v2-m3", "--port", "80", "--tokenization-workers", "1", "--max-concurrent-requests", "16", "--max-batch-tokens", "2048"]
    environment:
      HUGGINGFACE_HUB_OFFLINE: "1"
    ports:
      - "8081:80"
    volumes:
      - ../models:/data
    mem_limit: 4g
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/80' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

volumes:
  pgdata:
  milvusdata:
  meilidata:
  miniodata:
